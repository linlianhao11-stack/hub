# ===== 多步推理（6 条）=====

- id: contract_with_history_price
  category: multi_step
  user_input: "给阿里写讯飞x5 50 台合同 按上次价"
  expected_tools:
    - search_customers
    - search_products
    - get_customer_history
    - check_inventory
    - generate_contract_draft
  expected_clarification: false
  expected_text_contains: ["合同"]
  notes: "4 round 内：第 1 round 同时拿客户+商品（并行 2 tool）；第 2 round 历史价+库存（2 tool）；第 3 round 生成合同；第 4 round text"
  mock_llm_responses:
    # round 0：并行查客户+商品
    - tool_calls:
        - {name: "search_customers", args: {query: "阿里"}}
        - {name: "search_products", args: {query: "讯飞x5"}}
    # round 1：并行查历史价+库存
    - tool_calls:
        - {name: "get_customer_history", args: {customer_id: 9, product_id: 1}}
        - {name: "check_inventory", args: {product_id: 1}}
    # round 2：生成合同
    - tool_calls:
        - {name: "generate_contract_draft", args: {template_id: 1, customer_id: 9, items: [{product_id: 1, qty: 50, price: 2499}]}}
    # round 3：终态 text
    - text: "合同已生成，已发到您钉钉"

- id: contract_quote_only
  category: multi_step
  user_input: "给阿里报个讯飞x5 50 台的价"
  expected_tools: [search_customers, search_products, generate_price_quote]
  expected_clarification: false
  mock_llm_responses:
    - tool_calls: [{name: "search_customers", args: {query: "阿里"}}]
    - tool_calls: [{name: "search_products", args: {query: "讯飞x5"}}]
    - tool_calls: [{name: "generate_price_quote", args: {customer_id: 9, items: [{product_id: 1, qty: 50}]}}]
    - text: "报价单已生成"

- id: stock_check_then_order
  category: multi_step
  user_input: "讯飞 x5 还有多少？阿里要订 50 台"
  expected_tools: [search_products, check_inventory, search_customers]
  expected_clarification: false
  mock_llm_responses:
    - tool_calls: [{name: "search_products", args: {query: "讯飞 x5"}}]
    - tool_calls: [{name: "check_inventory", args: {product_id: 1}}]
    - tool_calls: [{name: "search_customers", args: {query: "阿里"}}]
    - text: "讯飞 x5 库存 49 台。阿里下单 50 台需补 1 台库存"

- id: customer_balance_then_history
  category: multi_step
  user_input: "阿里现在欠多少？最近成交价多少？"
  expected_tools: [search_customers, get_customer_balance, get_customer_history]
  expected_clarification: false
  mock_llm_responses:
    - tool_calls: [{name: "search_customers", args: {query: "阿里"}}]
    - tool_calls: [{name: "get_customer_balance", args: {customer_id: 9}}]
    - tool_calls: [{name: "get_customer_history", args: {customer_id: 9}}]
    - text: "阿里应收 ¥125K，最近成交价 ¥2,499"

- id: export_excel_top_customers
  category: multi_step
  user_input: "导出上月 top 10 客户的 Excel"
  expected_tools: [analyze_top_customers, export_to_excel]
  expected_clarification: false
  mock_llm_responses:
    - tool_calls: [{name: "analyze_top_customers", args: {period: "last_month", top_n: 10}}]
    - tool_calls: [{name: "export_to_excel", args: {table_data: [], file_name: "上月top10客户.xlsx"}}]
    - text: "Excel 已导出"

- id: contract_with_clarification
  category: multi_step
  user_input: "给阿里写合同"
  expected_clarification: true
  expected_clarification_contains: ["商品", "数量"]
  mock_llm_responses:
    - text: "请问哪个商品？数量多少？是否按上次价？"


# ===== 写操作 confirm 链路（5 条）=====

- id: voucher_create_must_confirm
