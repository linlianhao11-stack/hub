# Plan 6 Task 16 gold set schema：
#   - id: str, unique（必填）
#   - category: query | multi_step | write | business_dict | error（必填）
#   - user_input: str（必填）
#   - mock_llm_responses: list of {tool_calls?: list, text?: str}（必填）
#   - expected_tools: list[str]（可选）—— 期望出现的 tool 名（顺序不强制）
#   - expected_clarification: bool（可选，默认 false）
#   - expected_text_contains: list[str]（可选，非 clarification 时校验文本含关键词）
#   - expected_clarification_contains: list[str]（可选，clarification 时校验反问文本含关键词）
#   - notes: str（可选）—— 给人看的说明，runner 不读
#   - 未来扩展：evaluator: str（可选）—— Python 表达式 fallback evaluator（spec §10.2 提到）

# backend/hub/agent/eval/gold_set.yaml
# Plan 6 Task 16: 30 条 gold set 用例。每条标注用户输入 + 期望 tool 序列 + 期望文本（regex / 子串匹配）

# ===== 基础查询（12 条）=====

- id: query_product_inventory
