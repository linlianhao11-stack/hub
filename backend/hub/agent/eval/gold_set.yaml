  user_input: "把这周差旅做凭证"
  expected_tools: [search_orders]
  expected_clarification: false
  expected_text_contains: ["确认", "是"]
  notes: "写 tool 必须先 text 预览"
  mock_llm_responses:
    - tool_calls: [{name: "search_orders", args: {type: "expense_reimburse", since_days: 7}}]
    - text: "我准备创建 12 张凭证（差旅费）。回复'是'确认提交。"

- id: price_adjust_must_confirm
  category: write
  user_input: "给阿里讯飞x5 调价 8 折"
  expected_tools: [search_customers, search_products, get_customer_history]
  expected_clarification: false
  expected_text_contains: ["确认"]
  mock_llm_responses:
    - tool_calls: [{name: "search_customers", args: {query: "阿里"}}]
    - tool_calls: [{name: "search_products", args: {query: "讯飞x5"}}]
    - tool_calls: [{name: "get_customer_history", args: {customer_id: 9, product_id: 1}}]
    - text: "我准备给阿里调讯飞x5 价格到 ¥3199.20（8 折）。回复'是'确认。"

- id: stock_adjustment_must_confirm
