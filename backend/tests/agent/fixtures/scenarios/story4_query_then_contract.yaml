name: 故事 4：跨轮 query → contract（核心场景）
turns:
  - input: "查 SKG 有哪些产品有库存"
    expected_intent: query
    tool_caps:
      check_inventory: 1
  - input: "给翼蓝做合同 H5 10 个 300，F1 10 个 500，K5 20 个 300，地址广州市天河区华穗路406号中景B座，林生，13692977880"
    expected_intent: contract
    tool_caps:
      check_inventory: 0     # 第二轮绝对不能再查 — 物理不挂
      search_customers: 1
      search_products: {min: 1, max: 5}  # 1次合并搜 或 每 hint 单独搜（H5/F1/K5=3次）均可
      generate_contract_draft: 1
    sent_files_min: 1
    items_count: 3
    must_contain: ["广州", "华穗"]
